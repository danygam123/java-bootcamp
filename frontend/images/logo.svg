<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background for context (optional, can remove for transparency) -->
  <rect width="200" height="200" fill="#111111" rx="20"/>
  
  <g transform="translate(25, 35)">
    <!-- Tech Steam / Progress Blocks -->
    <rect x="50" y="10" width="12" height="12" fill="#FF9900" opacity="0.4" />
    <rect x="66" y="20" width="12" height="12" fill="#FF9900" opacity="0.7" />
    <rect x="82" y="5" width="12" height="12" fill="#FF9900" />
    
    <!-- Modern Mug Body -->
    <path d="M40,50 L110,50 C110,90 95,110 55,110 L40,110 Z" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linejoin="round"/>
    <!-- Mug Handle -->
    <path d="M110,65 C125,65 135,73 135,82 C135,91 125,95 110,95" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Code Bracket subtle detail inside mug -->
    <path d="M65,70 L55,80 L65,90" fill="none" stroke="#FF9900" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M85,70 L95,80 L85,90" fill="none" stroke="#FF9900" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
